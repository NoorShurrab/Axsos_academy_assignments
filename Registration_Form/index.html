<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <form>
        <h1>Registration Form</h1>
        <label for="firstname">First Name:&#42;</label>
        <input type="text" id="firstname" name="firstname" required>
        <br>
        <br>
        <label for="lastname">Last Name:&#42;</label>
        <input type="text" id="lastname" name="lastname" required>
        <br>
        <br>
        <label for="email">Email Address:&#42;</label>
        <input type="email" id="email" name="email" required>
        <br>
        <br>
        <label for="password">Password:&#42;</label>
        <input type="password" id="password" name="password" required>
        <br>
        <br>
        <label for="confirm_password">Confirm Password:&#42;</label>
        <input type="password" id="confirm_password" name="confirm_password" required>
        <br>
        <br>
        <label for="Birthday">Birthday:</label>
        <input type="date" id="Birthday" name="Birthday" required>
        <br>
        <br>
        <label for="gender">Gender Identity:</label><br>
        <input type="radio" id="male" name="gender" value="male"> Male
        <input type="radio" id="female" name="gender" value="female"> Female
        <input type="radio" id="non_binary" name="gender" value="non_binary"> Non-binary
        <input type="radio" id="no_answer" name="gender" value="no_answer"> I Prefer not to answer 
        <br>
        <br>
        <label for="description">A short description about myself:</label>
        <br>
        <textarea rows="4" cols="40" id="description" name="description"></textarea>
        <br>
        <br>
        <label for="language">Favorite Language:</label>
        <select id="language" name="language" required>
            <option value="JavaScript">JavaScript</option>
            <option value="Java">Java</option>
            <option value="PHP">PHP</option>
            <option value="Python">Python</option>
        </select>
        <br>
        <br>
        <input type="checkbox" checked> Yes, I would like to receive periodic email updates
        <br>
        <br>
        <button type="submit">Create Account</button>
        <p>&#42; Indicates a required field</p>
        
        
    </form>
</body>
</html>
